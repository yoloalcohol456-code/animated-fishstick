<!DOCTYPE html>
<html lang="en">
<head>
    <script src="coi-serviceworker.js"></script>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>GBA Cloud Experiment</title>
    <style>
        :root {
            --primary: #7C4DFF;
            --bg: #050505;
            --surface: rgba(30, 30, 35, 0.6);
            --ui-size: clamp(44px, 6.5vw, 72px);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
        html, body { height: 100%; margin: 0; background: var(--bg); color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif; overflow: hidden; }
        #root { height: 100vh; width: 100vw; display: flex; align-items: center; justify-content: center; position: relative; background-image: radial-gradient(circle at 50% 10%, #2a1a4a 0%, #000 60%); }
        .viewport-wrap { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .viewport { position: relative; width: 100%; max-width: 1100px; aspect-ratio: 3/2; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7); }
        #game { width: 100%; height: 100%; display: block; touch-action: none; }
        
        .save-toolbar { position: absolute; top: 0; left: 0; right: 0; background: rgba(0, 0, 0, 0.85); display: flex; justify-content: space-between; align-items: center; padding: 8px 16px; transform: translateY(-100%); transition: transform 0.25s ease-in-out; z-index: 50; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .viewport:hover .save-toolbar, .save-toolbar:focus-within { transform: translateY(0); }
        .toolbar-btn { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
        
        #launcher { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 40; backdrop-filter: blur(18px); overflow-y: auto; padding: 2rem 0; }
        .card { background: var(--surface); padding: 2rem; border-radius: 20px; width: 92%; max-width: 420px; text-align: center; margin: auto; }
        .drop-zone { border: 2px dashed #444; border-radius: 12px; padding: 14px; cursor: pointer; margin-bottom: 12px; }
        .drop-zone.active { border-color: var(--primary); }
        .btn-launch { background: #fff; color: #000; padding: 14px; border-radius: 12px; border: none; font-weight: 700; width: 100%; opacity: .6; cursor: pointer; }
        .btn-launch.ready { opacity: 1; }
        .touch-controls { position: absolute; inset: 0; z-index: 30; pointer-events: none; display: flex; align-items: flex-end; padding: 1rem; }
    </style>
</head>
<body>
    <div id="root">
        <div id="launcher">
            <div class="card">
                <h1>Emulator Pipeline v2.1</h1>
                <div class="drop-zone" id="drop-game" onclick="document.getElementById('in-file').click()">
                    <span class="file-name" id="label-game">Select ROM/ISO (GBA/NDS/PSP)</span>
                </div>
                <select id="select-frameskip">
                    <option value="1">Auto Balance</option>
                    <option value="2">Skip 2 (Perf)</option>
                    <option value="3">Skip 3 (Max Boost)</option>
                </select>
                <input type="file" id="in-file" accept=".gba,.gb,.gbc,.nds,.iso,.cso,.zip" style="display:none;">
                <button class="btn-launch" id="btn-start" onclick="bootEngine()" disabled>Start Engine</button>
                <div id="status-text">Ready...</div>
            </div>
        </div>

        <div class="viewport-wrap">
            <div class="viewport" id="viewport">
                <div class="save-toolbar">
                    <span id="toolbar-title">Active</span>
                </div>
                <div id="game"></div>
            </div>
        </div>
    </div>

    <script>
        let gameUrl = null;
        let coreType = 'mgba';
        let loadedRomName = "";

        // CORE PATCH: Handle PSP as a stream to avoid IndexedDB memory crashes
        async function handleIncomingFile(file) {
            if (!file) return;
            const ext = file.name.split('.').pop().toLowerCase();
            loadedRomName = file.name;

            if (['iso', 'cso'].includes(ext)) {
                // Use Direct Play for massive PSP files
                gameUrl = URL.createObjectURL(file);
                coreType = 'psp';
                document.getElementById('label-game').innerText = file.name + " (Direct Stream)";
                activateLauncher();
            } else if (['gba', 'gb', 'gbc', 'nds', 'zip'].includes(ext)) {
                // Continue using your existing chunking logic for small files
                // ... (Keep your original storeRom logic here)
                await RomLibrary.storeRom(file);
                // ...
            }
        }

        function activateLauncher() {
            const btn = document.getElementById('btn-start');
            btn.classList.add('ready');
            btn.removeAttribute('disabled');
        }

        async function bootEngine() {
            if (!gameUrl) return;
            document.getElementById('launcher').style.display = 'none';

            window.EJS_player = '#game';
            window.EJS_core = coreType;
            window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
            window.EJS_gameUrl = gameUrl;
            
            // CORE PATCH: Enable multithreading for PPSSPP
            if (coreType === 'psp') {
                window.EJS_threads = true; 
                window.EJS_Settings = { 
                    frameskip: document.getElementById('select-frameskip').value 
                };
            } else {
                window.EJS_Settings = { frameskip: document.getElementById('select-frameskip').value };
            }

            const script = document.createElement('script');
            script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
            document.body.appendChild(script);
        }

        // --- KEEP YOUR EXISTING RomLibrary OBJECT AND OTHER UTILS BELOW ---
    </script>
</body>
</html>
