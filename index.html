<!DOCTYPE html>
<html lang="en">
<head>

    <script>
        (function() {
            const originalCreateElement = document.createElement;
            document.createElement = function(tagName, options) {
                const element = originalCreateElement.call(document, tagName, options);
                const tag = tagName.toLowerCase();
                
                if (tag === 'script') {
                    const originalSetAttribute = element.setAttribute;
                    element.setAttribute = function(name, value) {
                        if (name.toLowerCase() === 'src' && typeof value === 'string' && (value.includes('emulatorjs.org') || value.includes('jsdelivr.net'))) {
                            element.crossOrigin = 'anonymous';
                        }
                        originalSetAttribute.call(element, name, value);
                    };
                    
                    const descriptor = Object.getOwnPropertyDescriptor(HTMLScriptElement.prototype, 'src');
                    Object.defineProperty(element, 'src', {
                        set: function(value) {
                            if (typeof value === 'string' && (value.includes('emulatorjs.org') || value.includes('jsdelivr.net'))) {
                                element.crossOrigin = 'anonymous';
                            }
                            if (descriptor && descriptor.set) {
                                descriptor.set.call(element, value);
                            } else {
                                originalSetAttribute.call(element, 'src', value);
                            }
                        },
                        get: function() {
                            return descriptor && descriptor.get ? descriptor.get.call(element) : element.getAttribute('src');
                        },
                        configurable: true,
                        enumerable: true
                    });
                } else if (tag === 'link') {
                    const originalSetAttribute = element.setAttribute;
                    element.setAttribute = function(name, value) {
                        if (name.toLowerCase() === 'href' && typeof value === 'string' && (value.includes('emulatorjs.org') || value.includes('jsdelivr.net'))) {
                            element.crossOrigin = 'anonymous';
                        }
                        originalSetAttribute.call(element, name, value);
                    };
                    
                    const descriptor = Object.getOwnPropertyDescriptor(HTMLLinkElement.prototype, 'href');
                    Object.defineProperty(element, 'href', {
                        set: function(value) {
                            if (typeof value === 'string' && (value.includes('emulatorjs.org') || value.includes('jsdelivr.net'))) {
                                element.crossOrigin = 'anonymous';
                            }
                            if (descriptor && descriptor.set) {
                                descriptor.set.call(element, value);
                            } else {
                                originalSetAttribute.call(element, 'href', value);
                            }
                        },
                        get: function() {
                            return descriptor && descriptor.get ? descriptor.get.call(element) : element.getAttribute('href');
                        },
                        configurable: true,
                        enumerable: true
                    });
                }
                return element;
            };
        })();
    </script>

        }

            height: 100%;
            margin: 0;
            background: var(--bg);

        .touch-controls {

        .dpad { left: 1rem; flex-direction: column; width: calc(var(--ui-size) * 2.2); height: calc(var(--ui-size) * 2.2); justify-content: center; }

        .control-btn {

            border-radius: 12px; background: rgba(255, 255, 255, 0.08);
            display: flex; align-items: center; justify-content: center;

        .control-btn:active, .control-btn.active { transform: scale(.95); background: var(--primary); }
        .btn-large { width: calc(var(--ui-size) * 1.3); height: calc(var(--ui-size) * 1.3); border-radius: 16px; }

        @media(min-width:900px) { .touch-controls { display: none; } }
        @media(max-width:420px) { :root { --ui-size: clamp(44px, 12vw, 64px); } }

    <script>
        // --- 1. INDEXEDDB ROM LIBRARY & SAVE FILE ARCHITECTURE ---
        const RomLibrary = {
            dbName: 'GBACloudLibrary',
            dbVersion: 2,
            chunkSize: 1024 * 1024,

            init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, this.dbVersion);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('manifest')) {
                            db.createObjectStore('manifest', { keyPath: 'name' });
                        }
                        if (!db.objectStoreNames.contains('chunks')) {
                            db.createObjectStore('chunks'); 
                        }
                        if (!db.objectStoreNames.contains('saves')) {
                            db.createObjectStore('saves');
                        }
                    };
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            },

            async storeRom(file) {
                const db = await this.init();
                const buffer = await file.arrayBuffer();
                const totalChunks = Math.ceil(buffer.byteLength / this.chunkSize);
                
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(['manifest', 'chunks'], 'readwrite');
                    const manifestStore = tx.objectStore('manifest');
                    const chunksStore = tx.objectStore('chunks');

                    manifestStore.put({
                        name: file.name,
                        size: file.size,
                        chunks: totalChunks,
                        ext: file.name.split('.').pop().toLowerCase(),
                        timestamp: Date.now()
                    });

                    for (let i = 0; i < totalChunks; i++) {
                        const start = i * this.chunkSize;
                        const end = Math.min(start + this.chunkSize, buffer.byteLength);
                        chunksStore.put(buffer.slice(start, end), `${file.name}_${i}`);
                    }

                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                });
            },

            async loadRom(name) {
                const db = await this.init();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(['manifest', 'chunks'], 'readonly');
                    const manifestStore = tx.objectStore('manifest');
                    const chunksStore = tx.objectStore('chunks');
                    const getReq = manifestStore.get(name);
                    
                    getReq.onsuccess = () => {
                        const manifest = getReq.result;
                        if (!manifest) return reject("ROM not found");

                        let loadedChunks = 0;
                        const chunksArray = new Array(manifest.chunks);

                        for (let i = 0; i < manifest.chunks; i++) {
                            const chunkReq = chunksStore.get(`${name}_${i}`);
                            chunkReq.onsuccess = () => {
                                chunksArray[i] = new Uint8Array(chunkReq.result);
                                loadedChunks++;
                                
                                if (loadedChunks === manifest.chunks) {
                                    const totalLength = chunksArray.reduce((acc, val) => acc + val.length, 0);
                                    const finalBuffer = new Uint8Array(totalLength);
                                    let offset = 0;
                                    for (const chunk of chunksArray) {
                                        finalBuffer.set(chunk, offset);
                                        offset += chunk.length;
                                    }
                                    const blob = new Blob([finalBuffer]);
                                    resolve({ url: URL.createObjectURL(blob), ext: manifest.ext, name: manifest.name });
                                }
                            };
                        }
                    };
                });
            },

            async getManifest() {
                const db = await this.init();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction('manifest', 'readonly');
                    const request = tx.objectStore('manifest').getAll();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            },

            async deleteRom(name) {
                const db = await this.init();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(['manifest', 'chunks', 'saves'], 'readwrite');
                    const getReq = tx.objectStore('manifest').get(name);
                    getReq.onsuccess = () => {
                        const manifest = getReq.result;
                        if (manifest) {
                            for (let i = 0; i < manifest.chunks; i++) {
                                tx.objectStore('chunks').delete(`${name}_${i}`);
                            }
                            tx.objectStore('manifest').delete(name);
                            const bareName = name.substring(0, name.lastIndexOf('.'));
                            tx.objectStore('saves').delete(bareName);
                        }
                    };
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                });
            },

            async storeSave(romName, b64Data) {
                const db = await this.init();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction('saves', 'readwrite');
                    tx.objectStore('saves').put(b64Data, romName);
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                });
            },

            async getSave(romName) {
                const db = await this.init();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction('saves', 'readonly');
                    const req = tx.objectStore('saves').get(romName);
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(tx.error);
                });
            }
        };

        // --- 2. GLOBAL VARIABLES & EMULATOR LOGIC ---
        let gameUrl = null;
        let biosUrl = null;
        let loadedRomName = "game";
        let targetSavePayload = null;
        let coreType = 'mgba';
        let cloudSyncEnabled = false;
        let isEditingLayout = false;
        let ffActive = false;

        const labelGame = document.getElementById('label-game');
        const dropGame = document.getElementById('drop-game');
        const btnStart = document.getElementById('btn-start');
        const launcher = document.getElementById('launcher');
        const touchControls = document.getElementById('touchControls');
        const statusText = document.getElementById('status-text');
        const saveDirectInput = document.getElementById('in-save-direct');

        // --- 3. UI UPDATES FOR LIBRARY ---
        async function updateLibraryUI() {
            const listEl = document.getElementById('rom-library-list');
            const games = await RomLibrary.getManifest();
            
            if (games.length === 0) {
                listEl.style.display = 'none';
                return;
            }
            
            listEl.style.display = 'block';
            listEl.innerHTML = '<div style="font-size:0.75rem; color:#aaa; margin-bottom:6px;">STORED LIBRARY</div>';
            
            games.forEach(game => {
                const item = document.createElement('div');
                item.className = 'library-item';
                
                const title = document.createElement('span');
                title.innerText = game.name;
                title.style.flexGrow = '1';
                title.onclick = () => loadFromLibrary(game.name);
                
                const delBtn = document.createElement('span');
                delBtn.className = 'btn-delete';
                delBtn.innerText = 'X';
                delBtn.onclick = async (e) => {
                    e.stopPropagation();
                    await RomLibrary.deleteRom(game.name);
                    updateLibraryUI();
                };
                
                item.appendChild(title);
                item.appendChild(delBtn);
                listEl.appendChild(item);
            });
        }

        async function loadFromLibrary(romName) {
            statusText.innerText = "Reassembling chunks from IndexedDB...";
            try {
                const gameData = await RomLibrary.loadRom(romName);
                gameUrl = gameData.url;
                loadedRomName = gameData.name.substring(0, gameData.name.lastIndexOf('.'));
                
                if (gameData.ext === 'gb' || gameData.ext === 'gbc') coreType = 'gambatte';
                else if (gameData.ext === 'nds') coreType = 'melonds';
                else coreType = 'mgba';

                labelGame.innerText = gameData.name;
                activateLauncher();
                statusText.innerText = "Loaded from storage. Ready.";
            } catch (err) {
                statusText.innerText = "Failed to load from storage.";
                console.error(err);
            }
        }

        // --- 4. FILE HANDLING ---
        const dropZone = document.getElementById('drop-game');
        ['dragenter', 'dragover'].forEach(eventName => dropZone.addEventListener(eventName, e => { e.preventDefault(); dropZone.classList.add('active'); }, false));
        ['dragleave', 'drop'].forEach(eventName => dropZone.addEventListener(eventName, e => { e.preventDefault(); dropZone.classList.remove('active'); }, false));
        
        dropZone.addEventListener('drop', e => { e.preventDefault(); if (e.dataTransfer.files.length) handleIncomingFile(e.dataTransfer.files[0]); });
        document.getElementById('in-file').addEventListener('change', e => { if (e.target.files.length > 0) handleIncomingFile(e.target.files[0]); });
        saveDirectInput.addEventListener('change', e => { if (e.target.files.length > 0) injectDirectSave(e.target.files[0]); });

        async function handleIncomingFile(file) {
            if (!file) return;
            const ext = file.name.split('.').pop().toLowerCase();
            loadedRomName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;

            if (['gba', 'gb', 'gbc', 'nds', 'zip'].includes(ext)) {
                statusText.innerText = "Chunking and saving ROM to library...";
                try {
                    await RomLibrary.storeRom(file);
                    await updateLibraryUI();
                    await loadFromLibrary(file.name);
                } catch(e) {
                    statusText.innerText = "Storage error: " + e.message;
                }
            }
            else if (['sav', 'srm'].includes(ext)) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    targetSavePayload = new Uint8Array(e.target.result);
                    statusText.innerText = `Save file (.${ext}) staged. Load ROM next.`;
                    labelGame.innerText = `Save staged: ${file.name}`;
                };
                reader.readAsArrayBuffer(file);
            }
            else if (ext === 'eclipse' || ext === 'json') {
                const reader = new FileReader();
                reader.onload = function (e) {
                    try { processEclipseBackup(JSON.parse(e.target.result)); } 
                    catch (err) { statusText.innerText = "Error parsing configuration structure."; }
                };
                reader.readAsText(file);
            }
            else { statusText.innerText = "Unsupported file type. Use ROM, save, or Eclipse backup."; }
        }

        // --- 5. SAVES AND EMULATOR CONTROLS ---
        function processEclipseBackup(json) {
            try {
                let saves = json.saves || (json.storage ? json.storage.saves : null);
                if (!saves && json.data && json.data.saves) saves = json.data.saves;
                if (!saves) { statusText.innerText = "No save data found inside .eclipse file."; return; }
                let foundKey = Object.keys(saves)[0];
                if (!foundKey) { statusText.innerText = "No save index found inside .eclipse file."; return; }
                let rawDataString = saves[foundKey];
                if (typeof rawDataString === 'string') {
                    if (rawDataString.startsWith('data:')) rawDataString = rawDataString.split(',')[1];
                    const binaryString = atob(rawDataString);
                    const bytes = new Uint8Array(binaryString.length);
                    for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
                    targetSavePayload = bytes;
                    statusText.innerText = "Eclipse Save injected safely. Ready for ROM.";
                    labelGame.innerText = `Save staged: ${foundKey}`;
                }
            } catch (e) { statusText.innerText = "Critical error reading .eclipse JSON file."; console.error(e); }
        }

        async function injectDirectSave(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async function (e) {
                const saveBytes = new Uint8Array(e.target.result);
                targetSavePayload = saveBytes;
                try { 
                    const b64 = base64EncodeUint8(saveBytes);
                    await RomLibrary.storeSave(loadedRomName, b64);
                    statusText.innerText = "Direct save imported to IndexedDB. Ready.";
                    labelGame.innerText = `Save staged: ${file.name}`;
                    if (window.EJS_emulatorRun) {
                        document.getElementById('toolbar-title').innerText = "Save Staged. Restart Core.";
                        alert("Save data imported directly to database! Please restart the game engine to read your new save.");
                    }
                } catch (err) { console.warn('IndexedDB set failed', err); }
            };
            reader.readAsArrayBuffer(file);
        }

        function activateLauncher() { btnStart.classList.add('ready'); btnStart.removeAttribute('disabled'); dropGame.classList.add('active'); }

        document.getElementById('in-file').addEventListener('change', e => { if (e.target.files.length > 0) handleIncomingFile(e.target.files[0]); });

        function base64EncodeUint8(bytes) {
            let binary = '';
            for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
            return btoa(binary);
        }

        async function exportBatterySave() {
            let base64Data = await RomLibrary.getSave(loadedRomName);
            if (!base64Data) { alert("No save data available to export."); return; }
            const binaryString = atob(base64Data);
            const dataArray = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) dataArray[i] = binaryString.charCodeAt(i);
            const link = document.createElement('a');
            link.href = URL.createObjectURL(new Blob([dataArray], { type: "application/octet-stream" }));
            link.download = `${loadedRomName}.sav`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function toggleCloudSync(val) {
            cloudSyncEnabled = (val === 'enabled');
            if (cloudSyncEnabled) {
                statusText.innerText = "Cloud Auto-Sync active. Saves backed up instantly.";
            }
        }

        async function performCloudBackup(romName, b64Data) {
            if (!cloudSyncEnabled) return;
            console.log(`[Cloud Sync Pipeline] Upstreaming payload mapping for ${romName}...`);
            try {
                localStorage.setItem(`cloud_backup_mirror_${romName}`, b64Data);
                console.log("[Cloud Sync] Mirror backup storage synchronized cleanly.");
            } catch (e) {
                console.error("[Cloud Sync] Remote endpoint link failed:", e);
            }
        }

        function toggleLayoutEdit() {
            isEditingLayout = !isEditingLayout;
            const dpad = document.getElementById('dpad');
            const btns = document.getElementById('actionButtons');
            const btnT = document.getElementById('btn-edit-layout');
            const btnL = document.getElementById('btn-edit-layout-launcher');
            
            const label = isEditingLayout ? "Save Controls" : "⚙ Edit Control Layout";
            if(btnT) btnT.innerText = isEditingLayout ? "Save Controls" : "Edit Layout";
            if(btnL) btnL.innerText = label;

            if (isEditingLayout) {
                dpad.style.border = "2px dashed #ff9800";
                btns.style.border = "2px dashed #ff9800";
                touchControls.style.pointerEvents = 'auto';
                document.getElementById('touchControls').style.display = 'flex';
            } else {
                dpad.style.border = "none";
                btns.style.border = "none";
                if (!window.EJS_emulatorRun && window.innerWidth >= 900) {
                    document.getElementById('touchControls').style.display = 'none';
                }
                localStorage.setItem('layout_pos_dpad', JSON.stringify({ left: dpad.style.left, top: dpad.style.top, bottom: dpad.style.bottom }));
                localStorage.setItem('layout_pos_btns', JSON.stringify({ right: btns.style.right, top: btns.style.top, bottom: btns.style.bottom }));
            }
        }

        function setupDraggableControl(elementId) {
            const el = document.getElementById(elementId);
            let active = false, initialX, initialY;

            el.addEventListener('pointerdown', (e) => {
                if (!isEditingLayout) return;
                active = true;
                initialX = e.clientX - el.offsetLeft;
                initialY = e.clientY - el.offsetTop;
                el.style.bottom = 'auto';
                e.preventDefault();
            });

            window.addEventListener('pointermove', (e) => {
                if (!active || !isEditingLayout) return;
                el.style.left = (e.clientX - initialX) + 'px';
                el.style.top = (e.clientY - initialY) + 'px';
                el.style.right = 'auto';
            });

            window.addEventListener('pointerup', () => active = false);
            window.addEventListener('pointercancel', () => active = false);
        }

        function loadControlLayouts() {
            const dpad = document.getElementById('dpad');
            const btns = document.getElementById('actionButtons');
            const sDpad = localStorage.getItem('layout_pos_dpad');
            const sBtns = localStorage.getItem('layout_pos_btns');
            if(sDpad) Object.assign(dpad.style, JSON.parse(sDpad));
            if(sBtns) Object.assign(btns.style, JSON.parse(sBtns));
        }

        function toggleFastForwardToolbar() {
            ffActive = !ffActive;
            synthKey('Space', ffActive ? 'keydown' : 'keyup');
            document.getElementById('toolbar-title').innerText = ffActive ? "Fast Forward: ACTIVE" : "In-Game Active";
        }

        function handleBios(input) {
            if (input.files && input.files[0]) biosUrl = URL.createObjectURL(input.files[0]);
        }

        async function bootEngine() {
            if (!gameUrl) return;
            launcher.classList.add('hidden');
            setTimeout(() => launcher.style.display = 'none', 400);

            window.EJS_player = '#game';
            window.EJS_core = coreType;
            window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
            window.EJS_startOnLoaded = true;
            window.EJS_gameUrl = gameUrl;
            if (biosUrl) window.EJS_biosUrl = biosUrl;
            
            window.EJS_Settings = { frameskip: document.getElementById('select-frameskip').value };
            window.EJS_coreConfig = { "melonds_threaded_rendering": "enabled", "melonds_screen_layout": "0", "melonds_boot_directly": "enabled" };
            window.EJS_forceSmooth = false;
            
            if (targetSavePayload) {
                const b64Str = base64EncodeUint8(targetSavePayload);
                window.EJS_b64Save = b64Str;
                await RomLibrary.storeSave(loadedRomName, b64Str);
                performCloudBackup(loadedRomName, b64Str);
            } else {
                const existingSave = await RomLibrary.getSave(loadedRomName);
                if (existingSave) window.EJS_b64Save = existingSave;
            }

            window.EJS_onSaveState = function(data) {
                if (data && data.b64) {
                    RomLibrary.storeSave(loadedRomName, data.b64).then(() => {
                        document.getElementById('toolbar-title').innerText = "Save Saved (IndexedDB)";
                        performCloudBackup(loadedRomName, data.b64);
                    });
                }
            };

            window.EJS_Buttons = { play: false, restart: true, save: true, load: true, settings: true, fullscreen: true };
            if (window.innerWidth < 900) touchControls.style.pointerEvents = 'auto';

            const script = document.createElement('script');
            script.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
            script.onload = () => { statusText.innerText = 'Emulator core initialized.'; };
            document.body.appendChild(script);
        }

        // --- 6. WINDOW RESIZING AND INPUT BINDING ---
        function fitViewport() {
            const canvas = document.getElementById('game').querySelector('canvas');
            if (canvas) { canvas.style.width = '100%'; canvas.style.height = '100%'; canvas.style.objectFit = 'contain'; }
        }
        new ResizeObserver(fitViewport).observe(document.getElementById('viewport'));

        const KEY_MAP = { 'ArrowUp': 'ArrowUp', 'ArrowDown': 'ArrowDown', 'ArrowLeft': 'ArrowLeft', 'ArrowRight': 'ArrowRight', 'KeyZ': 'KeyZ', 'KeyX': 'KeyX', 'Enter': 'Enter', 'ShiftLeft': 'ShiftLeft', 'Space': 'Space' };
        const KEY_CODES = { 'ArrowUp': 38, 'ArrowDown': 40, 'ArrowLeft': 37, 'ArrowRight': 39, 'KeyZ': 90, 'KeyX': 88, 'Enter': 13, 'ShiftLeft': 16, 'Space': 32 };

        function synthKey(key, type) {
            const ev = new KeyboardEvent(type, { key: key, code: key, keyCode: KEY_CODES[key] || 0, which: KEY_CODES[key] || 0, bubbles: true, cancelable: true });
            window.dispatchEvent(ev);
        }

        function bindTouchButtons() {
            document.querySelectorAll('.control-btn').forEach(btn => {
                let active = false; const key = btn.dataset.key; if (!key) return;
                const start = (e) => { 
                    e.preventDefault(); 
                    if (isEditingLayout) return;
                    if (active) return; active = true; btn.classList.add('active'); 
                    synthKey(KEY_MAP[key] || key, 'keydown'); 
                };
                const end = (e) => { 
                    e.preventDefault(); 
                    if (isEditingLayout) return;
                    if (!active) return; active = false; btn.classList.remove('active'); 
                    synthKey(KEY_MAP[key] || key, 'keyup'); 
                };
                btn.addEventListener('pointerdown', start, { passive: false });
                btn.addEventListener('pointerup', end); btn.addEventListener('pointercancel', end); btn.addEventListener('pointerleave', end);
                btn.addEventListener('contextmenu', e => e.preventDefault());
            });
        }
        
        bindTouchButtons();
        setupDraggableControl('dpad');
        setupDraggableControl('actionButtons');

        window.addEventListener('load', () => { updateLibraryUI(); loadControlLayouts(); setTimeout(fitViewport, 300); });
        window.addEventListener('dragover', e => e.preventDefault());
        window.addEventListener('drop', e => { e.preventDefault(); if (e.dataTransfer.files.length) handleIncomingFile(e.dataTransfer.files[0]); });
        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyT') {
                const tc = document.getElementById('touchControls');
                tc.style.display = (window.getComputedStyle(tc).display === 'none') ? 'flex' : 'none';
            }
        });
    </script>
</body>
</html>
